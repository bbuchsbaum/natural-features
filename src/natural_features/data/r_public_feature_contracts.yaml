version: 1
source: "~/code/natfeatures/R/extract_features.R"
notes:
  - "R public feature IDs are the compatibility surface for natural-features."
  - "expected_python_schema records the Python contract; r_catalog_schema records the R catalog value when useful for drift audits."
  - "speech.neural_vad is intentionally FeatureSeries in Python and implementation behavior, despite an older R catalog entry advertising EventSeries."
features:
  audio.ast:
    expected_python_schema: "FeatureSeries/v1"
    bundles: []
    required_default_keys: ["execution_mode", "stride_s"]
    allowed_python_default_extras: ["dim", "local_files_only", "model", "strict_dependency"]
  audio.clap:
