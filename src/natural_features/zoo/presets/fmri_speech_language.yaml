api_version: 1
preset:
  name: fmri_speech_language
  description: "Speech + language baseline with transcript fallback and articulatory outputs."
features:
  - id: asr
    use: speech.asr.whisper_chunked
    params:
      model: small
      language: auto
      word_timestamps: true
      chunk_window_s: 30.0
      chunk_overlap_s: 1.0
      strict_dependency: false

  - id: align
    use: speech.align.whisperx
    inputs:
      stimulus: "ref: input.audio"
      words: "ref: asr.words"
    params:
      backend: auto
      strict_dependency: false

  - id: ssl
    use: speech.ssl.wavlm
    params:
      layers: [2, 6, 12]
      stride_s: 0.02
      pooling: none
      strict_dependency: false

  - id: post
    use: speech.phonology.ctc_posteriors
    params:
      model: bobboyms/wav2vec2-base-en-phoneme-ctc-41h
      local_files_only: true
      strict_dependency: false
      drop_special_tokens: true

  - id: art_post
    use: speech.articulatory.from_posteriors
    inputs:
      posteriors: "ref: post.default"
    params:
      renormalize_posteriors: true
      include_uncertainty: true

  - id: art
    use: speech.articulatory.features
    inputs:
      words: "ref: asr.words"

  - id: emb
    use: language.embed.bert_words
    inputs:
      words: "ref: asr.words"
    params:
      layers: [12]
      strict_dependency: false

  - id: surprisal
    use: language.predict.surprisal
    inputs:
      words: "ref: asr.words"
