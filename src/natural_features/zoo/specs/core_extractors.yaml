api_version: 1
extractors:
  - name: video.frames.sample
    impl: natural_features.features.preprocess:video_sample_frames
    version: "1.0"
    modalities: [video, image]
    requires: [vision]
    tags: [preprocess, video, frames]
    params:
      stride_frames: { type: int, default: 2 }
      target_fps: { type: float, default: null, nullable: true }
    outputs:
      default: { schema: VideoStimulus/v1, kind: video }

  - name: video.trim
    impl: natural_features.features.preprocess:video_trim
    version: "1.0"
    modalities: [video, image]
    requires: [vision]
    tags: [preprocess, video, trim]
    params:
      start_s: { type: float, default: 0.0 }
      end_s: { type: float, default: null, nullable: true }
    outputs:
      default: { schema: VideoStimulus/v1, kind: video }

  - name: video.audio.extract
    impl: natural_features.features.preprocess:video_audio_extract
    version: "1.0"
    modalities: [video]
    requires: [ffmpeg]
    tags: [preprocess, video, audio]
    params:
      sr_hz: { type: int, default: 16000 }
      start_s: { type: float, default: 0.0 }
      duration_s: { type: float, default: null, nullable: true }
      ffmpeg_path: { type: str, default: ffmpeg }
      execution_mode: { type: str, default: fallback }
      strict_dependency: { type: bool, default: false }
    outputs:
      default: { schema: AudioStimulus/v1, kind: audio }

  - name: audio.trim
    impl: natural_features.features.preprocess:audio_trim
    version: "1.0"
    modalities: [audio]
    requires: [audio]
    tags: [preprocess, audio, trim]
    params:
      start_s: { type: float, default: 0.0 }
      end_s: { type: float, default: null, nullable: true }
    outputs:
      default: { schema: AudioStimulus/v1, kind: audio }

  - name: audio.resample
    impl: natural_features.features.preprocess:audio_resample
    version: "1.0"
    modalities: [audio]
    requires: [audio]
    tags: [preprocess, audio, resample]
    params:
      target_sr_hz: { type: int, default: 16000 }
    outputs:
      default: { schema: AudioStimulus/v1, kind: audio }

  - name: text.tokenize
    impl: natural_features.features.preprocess:text_tokenize
    version: "1.0"
    modalities: [text]
    requires: [text]
    tags: [preprocess, text, words]
    params:
      duration_s: { type: float, default: null, nullable: true }
    outputs:
      default: { schema: EventSeries/v1, kind: words }

  - name: image.ocr
    impl: natural_features.features.preprocess:image_ocr
    version: "1.0"
    modalities: [image]
    requires: [ocr]
    tags: [preprocess, image, ocr]
    params:
      min_confidence: { type: float, default: 0.0 }
      duration_s: { type: float, default: null, nullable: true }
      execution_mode: { type: str, default: fallback }
      strict_dependency: { type: bool, default: false }
    outputs:
      default: { schema: EventSeries/v1, kind: words }

  - name: video.ocr
    impl: natural_features.features.preprocess:video_ocr
    version: "1.0"
    modalities: [video]
    requires: [ocr]
    tags: [preprocess, video, ocr]
    params:
      stride_frames: { type: int, default: 1 }
      min_confidence: { type: float, default: 0.0 }
      execution_mode: { type: str, default: fallback }
      strict_dependency: { type: bool, default: false }
    outputs:
      default: { schema: EventSeries/v1, kind: words }

  - name: events.align
